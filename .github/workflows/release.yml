name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: ${{ matrix.asset_name }}
    strategy:
      matrix:
        include:
          - arch: x64
            asset_name: evi-linux-x64
            gulp_target: vscode-linux-x64
          - arch: arm64
            asset_name: evi-linux-arm64
            gulp_target: vscode-linux-arm64

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.2
          cache: 'npm'

      - run: npm ci

      - run: npm run compile

      - run: npm run gulp ${{ matrix.gulp_target }}

      - name: Package
        run: |
          dir="../VSCode-linux-${{ matrix.arch }}"
          tar czf "${{ github.workspace }}/${{ matrix.asset_name }}.tar.gz" -C .. "VSCode-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
