name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name'
        required: true

jobs:
  build:
    name: ${{ matrix.asset_name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            gulp_target: vscode-linux-x64
            asset_name: evi-linux-x64
            ext: tar.gz

          - os: ubuntu-latest
            gulp_target: vscode-linux-arm64
            asset_name: evi-linux-arm64
            ext: tar.gz

          - os: macos-latest
            gulp_target: vscode-darwin-arm64
            asset_name: evi-darwin-arm64
            ext: tar.gz

          - os: macos-13
            gulp_target: vscode-darwin-x64
            asset_name: evi-darwin-x64
            ext: tar.gz

          - os: windows-latest
            gulp_target: vscode-win32-x64
            asset_name: evi-win32-x64
            ext: zip

          - os: windows-latest
            gulp_target: vscode-win32-arm64
            asset_name: evi-win32-arm64
            ext: zip

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.2
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Build
        run: npm run gulp ${{ matrix.gulp_target }}

      - name: Package
        shell: bash
        run: |
          arch="${{ matrix.gulp_target }}" 
          platform_arch="${arch#vscode-}"
          build_dir="../VSCode-${platform_arch}"
          echo "Packaging from $build_dir"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            (cd .. && zip -r "${{ github.workspace }}/${{ matrix.asset_name }}.zip" "VSCode-${platform_arch}")
          else
            tar czf "${{ github.workspace }}/${{ matrix.asset_name }}.tar.gz" -C .. "VSCode-${platform_arch}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
