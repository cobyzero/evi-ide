name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            gulp_target: vscode-linux-x64-min-ci
            asset_name: evi-linux-x64
            arch: x64

          - os: ubuntu-latest
            gulp_target: vscode-linux-arm64-min-ci
            asset_name: evi-linux-arm64
            arch: arm64

          - os: macos-latest
            gulp_target: vscode-darwin-arm64-min-ci
            asset_name: evi-darwin-arm64
            arch: arm64

          - os: macos-13
            gulp_target: vscode-darwin-x64-min-ci
            asset_name: evi-darwin-x64
            arch: x64

          - os: windows-latest
            gulp_target: 'vscode-win32-x64-min-ci'
            asset_name: evi-win32-x64
            arch: x64

          - os: windows-latest
            gulp_target: 'vscode-win32-arm64-min-ci'
            asset_name: evi-win32-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.2
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Build
        run: npm run gulp ${{ matrix.gulp_target }}

      - name: Package artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cd ..
            powershell Compress-Archive -Path VSCode-${{ matrix.arch }} -DestinationPath ${{ github.workspace }}/${{ matrix.asset_name }}.zip
          else
            cd ..
            tar czf ${{ github.workspace }}/${{ matrix.asset_name }}.tar.gz VSCode-${{ matrix.arch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Evi IDE ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
